<div class="d-flex">
  <div class="col-sm-2">
    <p *ngIf="isLoggedIn && isAdmin" routerLink="/categories" class="alert alert-info">Categories</p>
    <p *ngIf="isLoggedIn && isAdmin" routerLink="/admin-users" class="alert alert-info">Admin Users</p>
    <p *ngIf="isLoggedIn" class="btn btn-danger" (click)="logout()">Logout</p>

  </div>
  <div class="col-sm-10 px-4">
    <app-confirm-modal *ngIf="modalData" [title]="modalData.title" [message]="modalData.message"
      (confirm)="handleResponse($event)">
    </app-confirm-modal>
    <router-outlet></router-outlet>
  </div>
</div>
