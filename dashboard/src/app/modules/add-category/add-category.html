<form [formGroup]="categoryForm" (ngSubmit)="addCategory()" class="card mb-4 p-3 shadow-sm">
    <div class="row g-3 align-items-end">
        <div class="col-md-5">
            <label class="form-label">Category Name</label>
            <input type="text" class="form-control" formControlName="name" placeholder="Enter category name" />
        </div>
        <div class="col-md-5">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" formControlName="description" placeholder="Enter description" />
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-success">Add Category</button>
        </div>
    </div>
</form>
