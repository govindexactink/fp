<div class="modal-backdrop" (click)="onCancel()">
    <div class="modal-box" (click)="$event.stopPropagation()">

        <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="m-0">{{ title }}</h5>
        <span style="cursor:pointer;" (click)="onCancel()">✖</span>
        </div>

        <p>{{ message }}</p>

        <button class="btn btn-danger mx-2" (click)="onConfirm()">Yes</button>
        <button class="btn btn-secondary mx-2" (click)="onCancel()">No</button>

    </div>
</div>
