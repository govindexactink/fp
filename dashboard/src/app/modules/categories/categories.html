  <table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Name</th>
        <th scope="col">Description</th>
        <th scope="col">Id</th>
        <th scope="col">Status</th>
        <th scope="col">Action</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let cat of categories; let i = index">

        <!-- Category row -->
        <tr class="table-secondary">
          <th>{{ i + 1 }}</th>
          <td>{{ cat?.name }}</td>
          <td>{{ cat?.description }}</td>
          <td>{{ cat?.cateId }}</td>
          <td>{{ cat?.status }}</td>
          <td>
            <button class="btn btn-info mx-1" title="edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-danger mx-1" title="delete" (click)="deleteItem(cat)"><i
                class="bi bi-trash"></i></button>
            <button class="btn btn-primary mx-1" title="Add task" routerLink="/add-task"><i
                class="bi bi-plus"></i></button>
          </td>
        </tr>

        <!-- Tasks inside this category -->
        <tr class="bg-light" *ngFor="let task of tasks; let e = index" [hidden]="!task.categoryId?.includes(cat._id)">

          <th>{{e +1}} </th>
          <td>{{ task?.name }}</td>
          <td>{{ task?.description }}</td>
          <td>{{ task?.taskId }}</td>
          <td>{{ task?.status }}</td>
          <td>
            <button class="btn btn-info btn-sm me-1" title="Edit task" [routerLink]="['/edit-task', task._id, cat._id]">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-danger btn-sm me-1" title="Delete task" (click)="deleteTask(task)">
              <i class="bi bi-trash"></i>
            </button>
            <button class="btn btn-primary btn-sm" title="Add location">
              <i class="bi bi-plus"></i>
            </button>
          </td>

        </tr>

      </ng-container>
    </tbody>
